<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Local Pocket Notes Editor</title>
  <style>
    :root {
      color-scheme: dark;
      --lp-bg: var(--lp-surface);
      --lp-surface: #36291f;
      --lp-surface-soft: rgba(255, 255, 255, 0.04);
      --lp-line: rgba(255, 229, 200, 0.14);
      --lp-line-strong: rgba(255, 229, 200, 0.28);
      --lp-ink: #f5ede5;
      --lp-muted: #b69782;
      --lp-accent-glow: rgba(255, 200, 140, 0.14);
    }
    :root[data-theme="modern"],
    :root[data-theme="ocean"],
    :root[data-theme="forest"],
    :root[data-theme="mono"],
    :root[data-theme="cyber"] {
      --lp-surface: #121c2a;
      --lp-surface-soft: rgba(255, 255, 255, 0.04);
      --lp-line: rgba(143, 185, 255, 0.16);
      --lp-line-strong: rgba(143, 185, 255, 0.3);
      --lp-ink: #eef5ff;
      --lp-muted: #9db0c8;
      --lp-accent-glow: rgba(99, 211, 255, 0.14);
    }
    :root[data-theme="minimal"],
    :root[data-theme="pastel"],
    :root[data-theme="sepia"] {
      color-scheme: light;
      --lp-surface: #fffcf7;
      --lp-surface-soft: rgba(77, 51, 26, 0.04);
      --lp-line: rgba(88, 58, 30, 0.14);
      --lp-line-strong: rgba(88, 58, 30, 0.24);
      --lp-ink: #261d17;
      --lp-muted: #7a6659;
      --lp-accent-glow: rgba(209, 120, 52, 0.12);
    }
    :root[data-theme="oled"],
    :root[data-theme="retro"],
    :root[data-theme="sunset"],
    :root[data-theme="aurora"] {
      --lp-surface: #0e0e0e;
      --lp-surface-soft: rgba(255, 255, 255, 0.03);
      --lp-line: rgba(255, 255, 255, 0.1);
      --lp-line-strong: rgba(255, 255, 255, 0.18);
      --lp-ink: #f8f8f8;
      --lp-muted: #aaaaaa;
      --lp-accent-glow: rgba(255, 159, 90, 0.12);
    }
    * {
      box-sizing: border-box;
    }
    html,
    body {
      margin: 0;
      height: 100%;
      min-height: 100%;
      background: var(--lp-bg);
      color: var(--lp-ink);
      font-family: "Aptos", "Segoe UI", sans-serif;
    }
    body {
      padding: 0;
      overflow: hidden;
    }
    .editor {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      height: 100%;
      padding: 16px 20px;
    }
    .title-input,
    .content-input {
      width: 100%;
      border: none;
      background: transparent;
      color: var(--lp-ink);
      padding: 0;
      box-shadow: none;
      transition: color 0.18s ease;
    }
    .title-input {
      flex: 0 0 auto;
      min-height: 40px;
      font: 700 24px/1.2 "Aptos Display", "Segoe UI", system-ui, sans-serif;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .content-input {
      flex: 1 1 auto;
      min-height: 240px;
      height: 100%;
      padding: 16px 0;
      resize: none;
      overflow-y: auto;
      scrollbar-gutter: stable;
      font: 400 15px/1.75 "Aptos", "Segoe UI", system-ui, sans-serif;
      letter-spacing: 0.01em;
      border-top: 1px solid var(--lp-line);
      border-radius: 0;
    }
    .content-input::-webkit-scrollbar {
      width: 12px;
    }
    .content-input::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 999px;
    }
    .content-input::-webkit-scrollbar-thumb {
      border: 2px solid transparent;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.22);
      background-clip: padding-box;
    }
    .content-input::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.34);
      background-clip: padding-box;
    }
    .title-input::placeholder,
    .content-input::placeholder {
      color: var(--lp-muted);
    }
    .title-input:focus,
    .content-input:focus {
      outline: none;
    }
    .content-input:focus {
      border-top-color: var(--lp-line-strong);
    }
  </style>
</head>
<body>
  <div class="editor">
    <input
      class="title-input"
      data-role="title-input"
      maxlength="120"
      placeholder="Note title"
      aria-label="Note title"
      autocomplete="off"
    >
    <textarea
      class="content-input"
      data-role="content-input"
      placeholder="Start writing... Lines starting with 1. auto-continue when you press Enter."
      aria-label="Note body"
      spellcheck="true"
    ></textarea>
  </div>
  <script src="notesEditorFrame.js"></script>
</body>
</html>
