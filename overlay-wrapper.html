<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Local Pocket AI Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 100vw; 
      height: 100vh; 
      overflow: hidden; 
      background: #1a1a2e; 
      display: flex; 
      flex-direction: column; 
    }
    #lp-overlay-topbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(26, 26, 46, 0.95);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 1000;
    }
    .lp-dropdown {
      flex: 0 0 auto;
      padding: 6px 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.3);
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      min-width: 120px;
    }
    .lp-dropdown:focus { outline: none; border-color: #8b5cf6; }
    #lp-overlay-iframe-container {
      flex: 1 1 auto;
      position: relative;
      overflow: hidden;
    }
    #lp-overlay-iframe {
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: auto;
    }
    #lp-overlay-iframe.pointer-events-none {
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="lp-overlay-topbar">
    <select id="lp-provider-dropdown" class="lp-dropdown">
      <option value="chatgpt">ChatGPT</option>
      <option value="claude">Claude</option>
      <option value="gemini">Gemini</option>
      <option value="google">Google</option>
      <option value="perplexity">Perplexity</option>
      <option value="copilot">Copilot</option>
      <option value="grok">Grok</option>
      <option value="deepseek">DeepSeek</option>
      <option value="poe">Poe</option>
      <option value="mistral">Mistral</option>
    </select>
    <select id="lp-ai-mode-dropdown" class="lp-dropdown">
      <option value="sidebar">Sidebar</option>
      <option value="overlay">Overlay</option>
    </select>
    <select id="lp-summary-mode-dropdown" class="lp-dropdown">
      <option value="auto">Auto</option>
      <option value="quick">Quick</option>
      <option value="deep">Deep</option>
      <option value="action">Action Items</option>
      <option value="study">Study Notes</option>
      <option value="research">Research</option>
      <option value="custom">Custom</option>
    </select>
    <button id="lp-custom-prompt-toggle" type="button" title="Togol panel custom prompt" style="flex:0 0 auto;padding:4px 8px;border:1px solid rgba(255,255,255,0.15);border-radius:6px;background:rgba(0,0,0,0.2);color:#aaa;font-size:14px;cursor:pointer;line-height:1;">✎</button>
    <button id="lp-sel-search-toggle" type="button" title="Enable/Disable Selection Search" aria-pressed="true" style="flex:0 0 auto;padding:4px 8px;border:1px solid rgba(255,255,255,0.15);border-radius:6px;background:rgba(0,0,0,0.2);color:#aaa;font-size:14px;cursor:pointer;line-height:1;">⌕</button>
    <button id="lp-summary-page-btn" type="button" title="Summary halaman ini" style="flex:0 0 auto;padding:4px 8px;border:1px solid rgba(100,200,150,0.4);border-radius:6px;background:rgba(60,200,120,0.12);color:#7fcfa0;font-size:12px;font-weight:bold;cursor:pointer;line-height:1;">S</button>
  </div>
  <div id="lp-custom-prompt-panel" style="display:none;flex-direction:column;gap:6px;padding:6px 12px;background:rgba(0,0,0,0.2);border-bottom:1px solid rgba(255,255,255,0.08);flex:0 0 auto;max-height:180px;overflow-y:auto;">
    <textarea id="lp-custom-prompt-textarea" placeholder="Tulis arahan custom prompt anda..." style="width:100%;min-height:48px;max-height:80px;padding:6px 8px;border:1px solid rgba(255,255,255,0.15);border-radius:6px;background:rgba(0,0,0,0.3);color:#eee;font-size:12px;resize:vertical;box-sizing:border-box;"></textarea>
    <div style="display:flex;gap:4px;flex-wrap:wrap;">
      <button id="lp-custom-prompt-save-btn" type="button" style="padding:4px 10px;border-radius:6px;border:1px solid rgba(60,200,120,0.4);background:rgba(60,200,120,0.12);color:#7fcfa0;font-size:11px;cursor:pointer;">Save as Templat</button>
      <button id="lp-custom-prompt-clear-btn" type="button" style="padding:4px 10px;border-radius:6px;border:1px solid rgba(255,100,100,0.3);background:rgba(255,60,60,0.1);color:#ff9090;font-size:11px;cursor:pointer;">✕ Clear</button>
    </div>
    <div id="lp-custom-prompt-template-list" style="display:flex;flex-direction:column;gap:4px;"></div>
  </div>
  <div id="lp-overlay-iframe-container">
    <iframe id="lp-overlay-iframe"></iframe>
  </div>
  <script src="overlay-wrapper.js"></script>
</body>
</html>
